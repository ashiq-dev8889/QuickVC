<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickVC - Elite Audio Ecosystem</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #030704 0%, #0d140f 100%);
            --accent-green: #00ff66;
            --accent-glow: rgba(0, 255, 102, 0.35);
            --glass-bg: rgba(10, 20, 14, 0.7);
            --glass-border: rgba(0, 255, 102, 0.12);
            --text-main: #f1f5f2;
            --text-muted: #788a7e;
            --danger: #ff3b30;
            --surface: rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #a3ffa3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        header p {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* App Shell Native Canvas */
        .app-container {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            height: 580px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 24px;
        }

        .view.active { display: flex; }

        /* Welcome/Lobby Form UI */
        .lobby-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-wrapper label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.25s ease;
        }

        input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.15);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.2); }
        .room-input { text-align: center; letter-spacing: 2px; font-family: monospace; font-size: 1.2rem; }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.primary {
            background: var(--accent-green);
            color: #030704;
            box-shadow: 0 4px 20px rgba(0, 255, 102, 0.25);
        }

        button.primary:active { transform: scale(0.98); opacity: 0.9; }

        button.secondary {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        button.secondary:hover { background: rgba(255, 255, 255, 0.08); }

        button.danger {
            background: rgba(255, 59, 48, 0.15);
            color: #ff453a;
            border: 1px solid rgba(255, 59, 48, 0.2);
        }
        button.danger:active { background: var(--danger); color: #fff; }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Native Discord Style Active View Layout */
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .room-identity h3 { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .room-identity p { font-size: 0.8rem; color: var(--accent-green); font-family: monospace; margin-top: 2px; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            background: rgba(0, 255, 102, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--accent-green);
            font-weight: 600;
        }
        .pulse-dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; animation: pulse 1.8s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(0, 255, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }

        .host-console-panel {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
        }
        .host-console-panel span { font-size: 0.7rem; font-weight: 700; color: var(--accent-green); text-transform: uppercase; display: block; margin-bottom: 8px;}
        .host-actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .host-actions-grid button { padding: 10px; font-size: 0.8rem; border-radius: 10px; }

        /* Feed List Grid Container */
        .user-feed-stack {
            flex: 1;
            overflow-y: auto;
            margin: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }
        .user-feed-stack::-webkit-scrollbar { width: 4px; }
        .user-feed-stack::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .native-member-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 12px 14px;
            border-radius: 16px;
            transition: border-color 0.3s ease;
        }
        
        .native-member-card.transmitting {
            border-color: rgba(0, 255, 102, 0.3);
            background: linear-gradient(90deg, rgba(0, 255, 102, 0.03) 0%, rgba(255,255,255,0.03) 100%);
        }

        .member-profile { display: flex; align-items: center; gap: 12px; }
        
        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #112217;
            border: 1.5px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .native-member-card.transmitting .member-avatar {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
        }

        .member-details .m-name { font-size: 0.9rem; font-weight: 600; color: #fff; }
        .member-details .m-role { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }

        .member-controls { display: flex; gap: 6px; }
        .control-bubble {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }
        .control-bubble:hover { background: rgba(255, 255, 255, 0.1); }
        .control-bubble.active-destructive { background: rgba(255, 59, 48, 0.15); color: #ff453a; }

        /* Floating Bottom Bar System Controls */
        .bottom-dock-controls {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 16px;
        }
    </style>
</head>
<body>

    <header>
        <h1>QuickVC</h1>
        <p>Elite Audio Platform</p>
    </header>

    <div class="app-container">
        
        <div id="lobbyView" class="view active">
            <div class="lobby-content">
                <div class="input-wrapper">
                    <label>Identity Handle</label>
                    <input type="text" id="usernameInput" placeholder="Enter your name..." maxlength="16">
                </div>
                
                <div style="height: 1px; background: rgba(255,255,255,0.06); margin: 8px 0;"></div>

                <div class="input-wrapper">
                    <label>Ecosystem Node Destination</label>
                    <input type="text" id="roomCodeInput" class="room-input" placeholder="0000000000" maxlength="10">
                </div>

                <div class="btn-stack">
                    <button id="joinRoomBtn" class="primary" disabled>⚡ Connect to Channel</button>
                    <button id="createRoomBtn" class="secondary">💎 Create Channel Node</button>
                </div>
            </div>
        </div>

        <div id="roomView" class="view">
            <div class="room-header">
                <div class="room-identity">
                    <h3 id="hostNameHeader">Voice Node</h3>
                    <p id="roomCodeDisplay">CODE: ----------</p>
                </div>
                <div class="status-badge"><div class="pulse-dot"></div>Live</div>
            </div>

            <div id="hostConsole" class="host-console-panel" style="display: none;">
                <span>Ecosystem Authority Console</span>
                <div class="host-actions-grid">
                    <button id="hostMuteAllBtn" class="secondary">🔒 Mute Room</button>
                    <button id="hostUnmuteAllBtn" class="secondary">🔓 Unmute Room</button>
                </div>
            </div>

            <div class="user-feed-stack" id="usersContainer"></div>

            <div class="bottom-dock-controls">
                <button id="selfMuteBtn" class="secondary">🎙️ Mute Audio</button>
                <button id="exitRoomBtn" class="danger">🚪 Disconnect</button>
            </div>
        </div>

    </div>

    <div id="audioSpeakerEcosystemMixer" style="display:none;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcKOAe5PMyY20zDba-ObQ9UvDQ_NjYN4A",
            authDomain: "quickvc-347a4.firebaseapp.com",
            projectId: "quickvc-347a4",
            storageBucket: "quickvc-347a4.firebasestorage.app",
            messagingSenderId: "860858171449",
            appId: "1:860858171449:web:df62f7966f959e0ff24de8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // WebRTC Infrastructure Variables
        const iceServers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let localStream = null;
        let peerConnections = {}; 

        let currentRoomCode = null;
        let isHost = false;
        let myUserId = "usr_" + Math.floor(1000 + Math.random() * 9000);
        let myUsername = "";
        let roomUnsubscribe = null;

        // DOM elements
        const lobbyView = document.getElementById('lobbyView');
        const roomView = document.getElementById('roomView');
        const usernameInput = document.getElementById('usernameInput');
        const roomCodeInput = document.getElementById('roomCodeInput');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');
        const hostConsole = document.getElementById('hostConsole');
        const usersContainer = document.getElementById('usersContainer');
        const selfMuteBtn = document.getElementById('selfMuteBtn');
        const exitRoomBtn = document.getElementById('exitRoomBtn');
        const hostMuteAllBtn = document.getElementById('hostMuteAllBtn');
        const hostUnmuteAllBtn = document.getElementById('hostUnmuteAllBtn');
        const audioSpeakerEcosystemMixer = document.getElementById('audioSpeakerEcosystemMixer');

        // Form Validation Monitoring Node Loop
        function validateLobbyForm() {
            const nameValid = usernameInput.value.trim().length >= 2;
            const codeValid = roomCodeInput.value.trim().length === 10;
            joinRoomBtn.disabled = !(nameValid && codeValid);
        }

        usernameInput.addEventListener('input', validateLobbyForm);
        roomCodeInput.addEventListener('input', () => {
            roomCodeInput.value = roomCodeInput.value.replace(/[^0-9]/g, '');
            validateLobbyForm();
        });

        // Initialize Audio Hardware Captures
        async function captureMicrophoneAndSpeakerAccess() {
            try {
                // Requesting mic access explicitly initializes and pairs bidirectional speaker outputs
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                alert("Microphone/Speaker ecosystem authorizations are required for real-time WebRTC audio sync mapping.");
                throw err;
            }
        }

        function generateRoomCode() {
            let code = "";
            for(let i=0; i<10; i++) code += Math.floor(Math.random() * 10).toString();
            return code;
        }

        createRoomBtn.onclick = async () => {
            myUsername = usernameInput.value.trim();
            if(!myUsername) return alert("Please specify your Identity Handle before creating rooms.");
            
            await captureMicrophoneAndSpeakerAccess();
            const newCode = generateRoomCode();
            isHost = true;
            
            const roomRef = doc(db, "rooms", newCode);
            await setDoc(roomRef, {
                roomCode: newCode,
                hostId: myUserId,
                globalMuteActive: false,
                forceTerminated: false,
                participants: {
                    [myUserId]: { id: myUserId, name: `${myUsername} (Host)`, isMuted: false, isBanned: false, serverMuted: false }
                }
            });
            window.location.search = `?room=${newCode}&user=${encodeURIComponent(myUsername)}`;
        };

        joinRoomBtn.onclick = () => {
            myUsername = usernameInput.value.trim();
            const code = roomCodeInput.value.trim();
            if(myUsername && code.length === 10) {
                window.location.search = `?room=${code}&user=${encodeURIComponent(myUsername)}`;
            }
        };

        async function parseURLRoutingMatrix() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            const userParam = urlParams.get('user');

            if (roomParam && roomParam.length === 10 && /^\d+$/.test(roomParam) && userParam) {
                currentRoomCode = roomParam;
                myUsername = decodeURIComponent(userParam);
                
                await captureMicrophoneAndSpeakerAccess();
                
                const roomRef = doc(db, "rooms", currentRoomCode);
                const roomSnap = await getDoc(roomRef);

                if (roomSnap.exists()) {
                    const roomData = roomSnap.data();
                    if (roomData.hostId === myUserId) {
                        isHost = true;
                    } else {
                        isHost = false;
                        let updatedParticipants = { ...roomData.participants };
                        
                        if(updatedParticipants[myUserId]?.isBanned) {
                            alert("Your node signature is banned from this structural hub ecosystem.");
                            window.location.search = '';
                            return;
                        }

                        updatedParticipants[myUserId] = {
                            id: myUserId,
                            name: myUsername,
                            isMuted: false,
                            isBanned: false,
                            serverMuted: roomData.globalMuteActive || false
                        };
                        await updateDoc(roomRef, { participants: updatedParticipants });
                        
                        setupWebRTCLinkAsPeer(currentRoomCode);
                    }
                    initializeActiveVoiceRoom(roomRef);
                } else {
                    alert("Specified Channel Pipeline Configuration not active in database clusters.");
                    window.location.search = '';
                }
            }
        }

        function initializeActiveVoiceRoom(roomRef) {
            lobbyView.classList.remove('active');
            roomView.classList.add('active');
            roomCodeDisplay.innerText = `CODE: ${currentRoomCode}`;

            if(isHost) {
                hostConsole.style.display = "block";
                setupWebRTCLinkAsHost(currentRoomCode);
            }

            roomUnsubscribe = onSnapshot(roomRef, (snapshot) => {
                if (!snapshot.exists()) { exitRoomSession(false); return; }
                const data = snapshot.data();
                if (data.forceTerminated) { exitRoomSession(false); return; }

                const myState = data.participants[myUserId];
                if (myState && myState.isBanned) { exitRoomSession(false); return; }

                if(myState) {
                    const localAudioTrack = localStream.getAudioTracks()[0];
                    if (myState.serverMuted || myState.isMuted) {
                        localAudioTrack.enabled = false;
                        selfMuteBtn.innerText = myState.serverMuted ? "🔇 Locked" : "🔇 Muted";
                    } else {
                        localAudioTrack.enabled = true;
                        selfMuteBtn.innerText = "🎙️ Mute Audio";
                    }
                }

                renderUserEcosystem(data.participants, roomRef, data.hostId);
            });
        }

        /* --- WebRTC Native Core Peer-to-Peer Operations Mixer Engine --- */
        
        function setupWebRTCLinkAsHost(roomCode) {
            const signalsRef = collection(db, "rooms", roomCode, "signals");
            onSnapshot(signalsRef, snapshot => {
                snapshot.docChanges().forEach(async change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        const peerId = change.doc.id; 
                        
                        if (data.offer && !peerConnections[peerId]) {
                            const pc = new RTCPeerConnection(iceServers);
                            peerConnections[peerId] = pc;

                            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                            pc.ontrack = event => mixAudioToSpeakerChannels(peerId, event.streams[0]);

                            pc.onicecandidate = event => {
                                if (event.candidate) {
                                    updateDoc(doc(db, "rooms", roomCode, "signals", peerId), {
                                        hostCandidates: data.hostCandidates ? [...data.hostCandidates, event.candidate.toJSON()] : [event.candidate.toJSON()]
                                    });
                                }
                            };

                            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                            const answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);

                            await updateDoc(doc(db, "rooms", roomCode, "signals", peerId), {
                                answer: { type: answer.type, sdp: answer.sdp }
                            });

                            if(data.peerCandidates) {
                                data.peerCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
                            }
                        }
                    }
                });
            });
        }

        async function setupWebRTCLinkAsPeer(roomCode) {
            const pc = new RTCPeerConnection(iceServers);
            peerConnections["host"] = pc;

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = event => mixAudioToSpeakerChannels("host", event.streams[0]);

            const signalDocRef = doc(db, "rooms", roomCode, "signals", myUserId);

            pc.onicecandidate = event => {
                if (event.candidate) {
                    getDoc(signalDocRef).then(snap => {
                        const existing = snap.data()?.peerCandidates || [];
                        updateDoc(signalDocRef, { peerCandidates: [...existing, event.candidate.toJSON()] });
                    });
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            await setDoc(signalDocRef, {
                offer: { type: offer.type, sdp: offer.sdp },
                peerCandidates: []
            });

            onSnapshot(signalDocRef, async (snap) => {
                const data = snap.data();
                if (!data) return;
                if (data.answer && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
                if (data.hostCandidates) {
                    data.hostCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)).catch(e => {}));
                }
            });
        }

        // Native Real-Time Hardware Speaker Playback Route
        function mixAudioToSpeakerChannels(id, remoteStream) {
            let speakerChannel = document.getElementById(`speaker-sink-${id}`);
            if (!speakerChannel) {
                speakerChannel = document.createElement('audio');
                speakerChannel.id = `speaker-sink-${id}`;
                speakerChannel.autoplay = true;
                speakerChannel.controls = false;
                audioSpeakerEcosystemMixer.appendChild(speakerChannel);
            }
            speakerChannel.srcObject = remoteStream;
        }

        function renderUserEcosystem(participants, roomRef, hostId) {
            usersContainer.innerHTML = "";
            Object.keys(participants).forEach(uid => {
                const user = participants[uid];
                if (user.isBanned) return;

                const card = document.createElement('div');
                const activeVoice = !user.isMuted && !user.serverMuted;
                card.className = `native-member-card ${activeVoice ? 'transmitting' : ''}`;

                const initialLetters = user.name ? user.name.substring(0, 2).toUpperCase() : "VC";

                card.innerHTML = `
                    <div class="member-profile">
                        <div class="member-avatar">${initialLetters}</div>
                        <div class="member-details">
                            <div class="m-name">${user.name}</div>
                            <div class="m-role">${uid === hostId ? 'Server Creator' : 'Ecosystem Member'}</div>
                        </div>
                    </div>
                    <div class="member-controls" id="container-actions-${uid}"></div>
                `;

                usersContainer.appendChild(card);
                const actionWrapper = document.getElementById(`container-actions-${uid}`);

                if (isHost && uid !== myUserId) {
                    const muteBtn = document.createElement('button');
                    muteBtn.className = `control-bubble ${user.serverMuted ? 'active-destructive' : ''}`;
                    muteBtn.innerText = "🔇";
                    muteBtn.title = "Server Mute Participant";
                    muteBtn.onclick = async () => {
                        let updated = { ...participants };
                        updated[uid].serverMuted = !updated[uid].serverMuted;
                        await updateDoc(roomRef, { participants: updated });
                    };

                    const banBtn = document.createElement('button');
                    banBtn.className = "control-bubble active-destructive";
                    banBtn.innerText = "🚫";
                    banBtn.title = "Ban Participant From Cluster";
                    banBtn.onclick = async () => {
                        let updated = { ...participants };
                        updated[uid].isBanned = true;
                        await updateDoc(roomRef, { participants: updated });
                    };

                    actionWrapper.appendChild(muteBtn);
                    actionWrapper.appendChild(banBtn);
                } else if (user.isMuted || user.serverMuted) {
                    actionWrapper.innerHTML = `<span style="font-size:0.75rem; color:var(--danger); font-weight:500;">MUTED</span>`;
                }
            });
        }

        selfMuteBtn.onclick = async () => {
            const roomRef = doc(db, "rooms", currentRoomCode);
            const roomSnap = await getDoc(roomRef);
            if(roomSnap.exists()) {
                const data = roomSnap.data();
                if(data.participants[myUserId].serverMuted) return;

                let updated = { ...data.participants };
                updated[myUserId].isMuted = !updated[myUserId].isMuted;
                await updateDoc(roomRef, { participants: updated });
            }
        };

        hostMuteAllBtn.onclick = async () => {
            const roomRef = doc(db, "rooms", currentRoomCode);
            const roomSnap = await getDoc(roomRef);
            if (roomSnap.exists()) {
                let updated = { ...roomSnap.data().participants };
                Object.keys(updated).forEach(uid => { if(uid !== myUserId) updated[uid].serverMuted = true; });
                await updateDoc(roomRef, { participants: updated, globalMuteActive: true });
            }
        };

        hostUnmuteAllBtn.onclick = async () => {
            const roomRef = doc(db, "rooms", currentRoomCode);
            const roomSnap = await getDoc(roomRef);
            if (roomSnap.exists()) {
                let updated = { ...roomSnap.data().participants };
                Object.keys(updated).forEach(uid => { if(uid !== myUserId) updated[uid].serverMuted = false; });
                await updateDoc(roomRef, { participants: updated, globalMuteActive: false });
            }
        };

        async function exitRoomSession(cleanExit = true) {
            if(roomUnsubscribe) roomUnsubscribe();
            if (localStream) localStream.getTracks().forEach(track => track.stop());

            Object.keys(peerConnections).forEach(key => {
                peerConnections[key].close();
            });

            if (cleanExit && currentRoomCode) {
                const roomRef = doc(db, "rooms", currentRoomCode);
                if (isHost) {
                    await updateDoc(roomRef, { forceTerminated: true });
                    await deleteDoc(roomRef);
                } else {
                    const roomSnap = await getDoc(roomRef);
                    if(roomSnap.exists()){
                        let updated = { ...roomSnap.data().participants };
                        delete updated[myUserId];
                        await updateDoc(roomRef, { participants: updated });
                    }
                }
            }
            window.location.search = '';
        }

        exitRoomBtn.onclick = () => exitRoomSession(true);
        window.onload = parseURLRoutingMatrix;
    </script>
</body>
</html>
