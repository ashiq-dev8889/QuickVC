<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickVC - Premium Voice Chat</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #050b07 0%, #111a14 100%);
            --accent-green: #00ff66;
            --accent-glow: rgba(0, 255, 102, 0.4);
            --glass-bg: rgba(15, 27, 20, 0.65);
            --glass-border: rgba(0, 255, 102, 0.15);
            --text-main: #e2e8f0;
            --text-muted: #85998a;
            --danger: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ffffff, var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .view { display: none; }
        .view.active { display: block; }

        .input-group { margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-align: center;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button.primary {
            background: var(--accent-green);
            color: #050b07;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button.danger {
            background: rgba(255, 51, 51, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 51, 51, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .room-title h3 { font-size: 1.3rem; color: #fff;}
        .room-title span { font-size: 0.8rem; color: var(--accent-green); font-family: monospace;}

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 25px;
        }

        .user-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.25);
            padding: 12px 16px;
            border-radius: 14px;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1c3524;
            border: 2px solid var(--accent-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--accent-green);
        }

        .avatar.speaking { box-shadow: 0 0 12px var(--accent-green); }

        .action-icons { display: flex; gap: 8px; }
        
        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
        }
        .icon-btn.active-danger { background: rgba(255, 51, 51, 0.2); color: var(--danger); }

        .host-panel {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--glass-border);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .host-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .host-btns button { padding: 10px; font-size: 0.85rem; border-radius: 8px; }

        .control-dock {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>QuickVC</h1>
        <p>Premium Audio Ecosystem</p>
    </header>

    <main class="glass-panel">
        
        <div id="lobbyView" class="view active">
            <div class="input-group">
                <input type="text" id="roomCodeInput" placeholder="Enter 10-Digit Code" maxlength="10">
            </div>
            <div class="btn-stack">
                <button id="joinRoomBtn" class="primary" disabled>Join Ecosystem</button>
                <button id="createRoomBtn" class="secondary">Create Elite Room</button>
            </div>
        </div>

        <div id="roomView" class="view">
            <div class="room-header">
                <div class="room-title">
                    <h3>Voice Channel</h3>
                    <span id="roomCodeDisplay">CODE: ----------</span>
                </div>
                <div id="statusIndicator" style="font-size: 0.8rem; color: var(--accent-green);">● Connected</div>
            </div>

            <div id="hostConsole" class="host-panel" style="display: none;">
                <p style="font-size: 0.8rem; color: var(--accent-green); font-weight: bold;">HOST CONSOLE</p>
                <div class="host-btns">
                    <button id="hostMuteAllBtn" class="secondary">Mute All</button>
                    <button id="hostUnmuteAllBtn" class="secondary">Unmute All</button>
                </div>
            </div>

            <div class="user-list" id="usersContainer"></div>

            <div class="control-dock">
                <button id="selfMuteBtn" class="secondary">🎙️ Mute</button>
                <button id="exitRoomBtn" class="danger">🚪 Disconnect</button>
            </div>
        </div>

    </main>

    <div id="remoteAudioContainer" style="display:none;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcKOAe5PMyY20zDba-ObQ9UvDQ_NjYN4A",
            authDomain: "quickvc-347a4.firebaseapp.com",
            projectId: "quickvc-347a4",
            storageBucket: "quickvc-347a4.firebasestorage.app",
            messagingSenderId: "860858171449",
            appId: "1:860858171449:web:df62f7966f959e0ff24de8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // WebRTC Global variables
        const iceServers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let localStream = null;
        let peerConnections = {}; // Stores RTCPeerConnection instances keyed by userId

        let currentRoomCode = null;
        let isHost = false;
        let myUserId = "user_" + Math.floor(1000 + Math.random() * 9000);
        let roomUnsubscribe = null;

        // DOM elements
        const lobbyView = document.getElementById('lobbyView');
        const roomView = document.getElementById('roomView');
        const roomCodeInput = document.getElementById('roomCodeInput');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');
        const hostConsole = document.getElementById('hostConsole');
        const usersContainer = document.getElementById('usersContainer');
        const selfMuteBtn = document.getElementById('selfMuteBtn');
        const exitRoomBtn = document.getElementById('exitRoomBtn');
        const hostMuteAllBtn = document.getElementById('hostMuteAllBtn');
        const hostUnmuteAllBtn = document.getElementById('hostUnmuteAllBtn');
        const remoteAudioContainer = document.getElementById('remoteAudioContainer');

        // Force numeric 10 digit entry formatting
        roomCodeInput.addEventListener('input', () => {
            roomCodeInput.value = roomCodeInput.value.replace(/[^0-9]/g, '');
            joinRoomBtn.disabled = roomCodeInput.value.length !== 10;
        });

        // Initialize user hardware access
        async function getMicrophoneMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                alert("Microphone hardware access is mandatory to join voice streams.");
                throw err;
            }
        }

        // Generate custom ecosystem ID
        function generateRoomCode() {
            let code = "";
            for(let i=0; i<10; i++) code += Math.floor(Math.random() * 10).toString();
            return code;
        }

        createRoomBtn.onclick = async () => {
            await getMicrophoneMedia();
            const newCode = generateRoomCode();
            isHost = true;
            
            const roomRef = doc(db, "rooms", newCode);
            await setDoc(roomRef, {
                roomCode: newCode,
                hostId: myUserId,
                globalMuteActive: false,
                forceTerminated: false,
                participants: {
                    [myUserId]: { id: myUserId, name: "Host (You)", isMuted: false, isBanned: false, serverMuted: false }
                }
            });
            window.location.search = `?${newCode}`;
        };

        joinRoomBtn.onclick = () => {
            const code = roomCodeInput.value.trim();
            if(code.length === 10) window.location.search = `?${code}`;
        };

        async function checkUrlRouting() {
            const queryParams = window.location.search.replace('?', '');
            if (queryParams.length === 10 && /^\d+$/.test(queryParams)) {
                currentRoomCode = queryParams;
                await getMicrophoneMedia();
                
                const roomRef = doc(db, "rooms", currentRoomCode);
                const roomSnap = await getDoc(roomRef);

                if (roomSnap.exists()) {
                    const roomData = roomSnap.data();
                    if (roomData.hostId === myUserId) {
                        isHost = true;
                    } else {
                        isHost = false;
                        let updatedParticipants = { ...roomData.participants };
                        
                        if(updatedParticipants[myUserId]?.isBanned) {
                            alert("You are banned from this node.");
                            window.location.search = '';
                            return;
                        }

                        updatedParticipants[myUserId] = {
                            id: myUserId,
                            name: `Peer Node ${myUserId.split('_')[1]}`,
                            isMuted: false,
                            isBanned: false,
                            serverMuted: roomData.globalMuteActive || false
                        };
                        await updateDoc(roomRef, { participants: updatedParticipants });
                        
                        // Peers signal to Host that they are ready to link WebRTC
                        setupWebRTCLinkAsPeer(currentRoomCode);
                    }
                    initializeActiveVoiceRoom(roomRef);
                } else {
                    alert("Ecosystem configuration not found.");
                    window.location.search = '';
                }
            }
        }

        function initializeActiveVoiceRoom(roomRef) {
            lobbyView.classList.remove('active');
            roomView.classList.add('active');
            roomCodeDisplay.innerText = `CODE: ${currentRoomCode}`;

            if(isHost) {
                hostConsole.style.display = "block";
                setupWebRTCLinkAsHost(currentRoomCode);
            }

            roomUnsubscribe = onSnapshot(roomRef, (snapshot) => {
                if (!snapshot.exists()) {
                    exitRoomSession(false);
                    return;
                }
                const data = snapshot.data();
                if (data.forceTerminated) { exitRoomSession(false); return; }

                const myState = data.participants[myUserId];
                if (myState && myState.isBanned) { exitRoomSession(false); return; }

                // Track and enforce hardware muting safely based on state alterations
                if(myState) {
                    const trackingTrack = localStream.getAudioTracks()[0];
                    if (myState.serverMuted || myState.isMuted) {
                        trackingTrack.enabled = false;
                        selfMuteBtn.innerText = myState.serverMuted ? "🔇 Locked Mute" : "🔇 Muted";
                    } else {
                        trackingTrack.enabled = true;
                        selfMuteBtn.innerText = "🎙️ Mute";
                    }
                }

                renderUserEcosystem(data.participants, roomRef, data.hostId);
            });
        }

        /* --- WebRTC Signalling Layer Engine --- */
        
        // Host Setup Logic: Listens for incoming connection offers from joining peers
        function setupWebRTCLinkAsHost(roomCode) {
            const signalsRef = collection(db, "rooms", roomCode, "signals");
            
            onSnapshot(signalsRef, snapshot => {
                snapshot.docChanges().forEach(async change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        const peerId = change.doc.id; // Peer identity is the Document ID
                        
                        if (data.offer && !peerConnections[peerId]) {
                            const pc = new RTCPeerConnection(iceServers);
                            peerConnections[peerId] = pc;

                            // Mount local microhpone audio track to connection
                            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

                            // Output remote track to speakers
                            pc.ontrack = event => handleRemoteAudioTrack(peerId, event.streams[0]);

                            // Sync local host network configurations back to peer
                            pc.onicecandidate = event => {
                                if (event.candidate) {
                                    updateDoc(doc(db, "rooms", roomCode, "signals", peerId), {
                                        hostCandidates: data.hostCandidates ? [...data.hostCandidates, event.candidate.toJSON()] : [event.candidate.toJSON()]
                                    });
                                }
                            };

                            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                            const answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);

                            await updateDoc(doc(db, "rooms", roomCode, "signals", peerId), {
                                answer: { type: answer.type, sdp: answer.sdp }
                            });

                            // Inject already existing candidate strings
                            if(data.peerCandidates) {
                                data.peerCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
                            }
                        }
                    }
                });
            });
        }

        // Peer Setup Logic: Initiates the offer to the Host
        async function setupWebRTCLinkAsPeer(roomCode) {
            const pc = new RTCPeerConnection(iceServers);
            peerConnections["host"] = pc;

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = event => handleRemoteAudioTrack("host", event.streams[0]);

            const signalDocRef = doc(db, "rooms", roomCode, "signals", myUserId);

            pc.onicecandidate = event => {
                if (event.candidate) {
                    getDoc(signalDocRef).then(snap => {
                        const existing = snap.data()?.peerCandidates || [];
                        updateDoc(signalDocRef, { peerCandidates: [...existing, event.candidate.toJSON()] });
                    });
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            await setDoc(signalDocRef, {
                offer: { type: offer.type, sdp: offer.sdp },
                peerCandidates: []
            });

            // Watch for answer and incoming network candidates from the Host
            onSnapshot(signalDocRef, async (snap) => {
                const data = snap.data();
                if (!data) return;

                if (data.answer && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
                if (data.hostCandidates) {
                    data.hostCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)).catch(e => {}));
                }
            });
        }

        // Dynamically handles playing the WebRTC audio stream through browser speakers
        function handleRemoteAudioTrack(id, stream) {
            let audioEl = document.getElementById(`audio-${id}`);
            if (!audioEl) {
                audioEl = document.createElement('audio');
                audioEl.id = `audio-${id}`;
                audioEl.autoplay = true;
                remoteAudioContainer.appendChild(audioEl);
            }
            audioEl.srcObject = stream;
        }

        // Dynamic Native Discord Interface Rendering
        function renderUserEcosystem(participants, roomRef, hostId) {
            usersContainer.innerHTML = "";
            Object.keys(participants).forEach(uid => {
                const user = participants[uid];
                if (user.isBanned) return;

                const card = document.createElement('div');
                card.className = "user-card";
                const activeVoice = !user.isMuted && !user.serverMuted;

                card.innerHTML = `
                    <div class="user-info">
                        <div class="avatar ${activeVoice ? 'speaking' : ''}">🎙️</div>
                        <div class="user-meta">
                            <div class="name">${user.name}</div>
                            <div class="role">${uid === hostId ? 'Host Authority' : 'Endpoint Node'}</div>
                        </div>
                    </div>
                    <div class="action-icons" id="actions-${uid}"></div>
                `;

                usersContainer.appendChild(card);
                const actionWrapper = document.getElementById(`actions-${uid}`);

                if (isHost && uid !== myUserId) {
                    const muteBtn = document.createElement('button');
                    muteBtn.className = `icon-btn ${user.serverMuted ? 'active-danger' : ''}`;
                    muteBtn.innerText = "🔇";
                    muteBtn.onclick = async () => {
                        let updated = { ...participants };
                        updated[uid].serverMuted = !updated[uid].serverMuted;
                        await updateDoc(roomRef, { participants: updated });
                    };

                    const banBtn = document.createElement('button');
                    banBtn.className = "icon-btn active-danger";
                    banBtn.innerText = "🚫";
                    banBtn.onclick = async () => {
                        let updated = { ...participants };
                        updated[uid].isBanned = true;
                        await updateDoc(roomRef, { participants: updated });
                    };

                    actionWrapper.appendChild(muteBtn);
                    actionWrapper.appendChild(banBtn);
                } else if (user.isMuted || user.serverMuted) {
                    actionWrapper.innerHTML = `<span style="font-size:0.8rem; color:var(--text-muted);">Muted</span>`;
                }
            });
        }

        selfMuteBtn.onclick = async () => {
            const roomRef = doc(db, "rooms", currentRoomCode);
            const roomSnap = await getDoc(roomRef);
            if(roomSnap.exists()) {
                const data = roomSnap.data();
                if(data.participants[myUserId].serverMuted) return;

                let updated = { ...data.participants };
                updated[myUserId].isMuted = !updated[myUserId].isMuted;
                await updateDoc(roomRef, { participants: updated });
            }
        };

        hostMuteAllBtn.onclick = async () => {
            const roomRef = doc(db, "rooms", currentRoomCode);
            const roomSnap = await getDoc(roomRef);
            if (roomSnap.exists()) {
                let updated = { ...roomSnap.data().participants };
                Object.keys(updated).forEach(uid => { if(uid !== myUserId) updated[uid].serverMuted = true; });
                await updateDoc(roomRef, { participants: updated, globalMuteActive: true });
            }
        };

        hostUnmuteAllBtn.onclick = async () => {
            const roomRef = doc(db, "rooms", currentRoomCode);
            const roomSnap = await getDoc(roomRef);
            if (roomSnap.exists()) {
                let updated = { ...roomSnap.data().participants };
                Object.keys(updated).forEach(uid => { if(uid !== myUserId) updated[uid].serverMuted = false; });
                await updateDoc(roomRef, { participants: updated, globalMuteActive: false });
            }
        };

        async function exitRoomSession(cleanExit = true) {
            if(roomUnsubscribe) roomUnsubscribe();
            
            // Turn off local hardware microphone pickup cleanly
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            // Close down active peer connection channels completely
            Object.keys(peerConnections).forEach(key => {
                peerConnections[key].close();
            });

            if (cleanExit && currentRoomCode) {
                const roomRef = doc(db, "rooms", currentRoomCode);
                if (isHost) {
                    await updateDoc(roomRef, { forceTerminated: true });
                    await deleteDoc(roomRef);
                } else {
                    const roomSnap = await getDoc(roomRef);
                    if(roomSnap.exists()){
                        let updated = { ...roomSnap.data().participants };
                        delete updated[myUserId];
                        await updateDoc(roomRef, { participants: updated });
                    }
                }
            }
            window.location.search = '';
        }

        exitRoomBtn.onclick = () => exitRoomSession(true);
        window.onload = checkUrlRouting;
    </script>
</body>
</html>
